version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/platform.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8
root:
  level: INFO
  handlers: [console, file]
loggers:
  collectors:
    level: INFO
  spark_jobs:
    level: INFO
  models:
    level: INFO
  web:
    level: INFO
